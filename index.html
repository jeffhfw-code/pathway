<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0D0D14">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Pathway">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-180.png">
<title>Pathway Analyzer</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{background:#0D0D14;-webkit-text-size-adjust:100%}
body{font-family:"IBM Plex Sans",system-ui,sans-serif;color:#E8E8EC;background:#0D0D14;line-height:1.55;min-height:100vh;min-height:100dvh;touch-action:manipulation}
::selection{background:#2E5AA0;color:#fff}
input,select,button,textarea{font-family:inherit}

/* ── Layout ───────────────────────────────────────────────────── */
#app{padding:2rem 1.5rem;max-width:860px;margin:0 auto;padding-left:max(1.5rem,env(safe-area-inset-left));padding-right:max(1.5rem,env(safe-area-inset-right))}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:14px 1.5rem;border-bottom:1px solid #1E1E2E;margin-bottom:0;padding-left:max(1.5rem,env(safe-area-inset-left));padding-right:max(1.5rem,env(safe-area-inset-right))}
.topbar-brand{display:flex;align-items:center;gap:10px;font-weight:600;font-size:14px;letter-spacing:.04em;color:#8AA8D8}
.topbar-brand svg{width:22px;height:22px}
.topbar-nav{display:flex;gap:24px}
.topbar-nav a{font-size:12px;font-weight:500;letter-spacing:.08em;text-transform:uppercase;color:#6B6B78;text-decoration:none;transition:color .15s}
.topbar-nav a:hover,.topbar-nav a.active{color:#8AA8D8}

/* ── Progress ─────────────────────────────────────────────────── */
.pg-progress{display:flex;align-items:center;gap:6px;margin-bottom:2rem}
.pg-dot{width:8px;height:8px;border-radius:50%;background:#2A2A3A;transition:background .2s}
.pg-dot.done{background:#4A7FBF}.pg-dot.cur{background:#6EA4E8;width:10px;height:10px;box-shadow:0 0 8px rgba(110,164,232,.35)}
.pg-label{font-size:11px;color:#6B6B78;margin-left:8px;font-family:"IBM Plex Mono",monospace}

/* ── Form elements ────────────────────────────────────────────── */
.q-title{font-size:17px;font-weight:500;margin:0 0 6px;color:#E8E8EC}
.q-sub{font-size:13px;color:#9B9BA7;margin:0 0 16px;line-height:1.55}
.field-help{font-size:12px;color:#6B6B78;margin-top:6px;line-height:1.55}
.gis-link{display:inline-flex;align-items:center;gap:4px;font-size:12px;color:#6EA4E8;text-decoration:none;margin-top:6px;font-weight:500}.gis-link:hover{text-decoration:underline;color:#8EBAF0}
.radio-row{display:flex;gap:8px;flex-wrap:wrap}
.radio-btn{padding:8px 18px;font-size:13px;border:1.5px solid #2A2A3A;border-radius:6px;cursor:pointer;background:transparent;color:#9B9BA7;transition:all .12s}
.radio-btn:hover{border-color:#3A3A4D;color:#E8E8EC;background:#1C1C2A}
.radio-btn.sel{background:#2E5AA0;color:#fff;border-color:#2E5AA0;font-weight:500}
.btn-row{display:flex;gap:8px;margin-top:1.5rem}
.btn-primary{padding:10px 28px;font-size:13px;font-weight:500;border:none;border-radius:6px;background:#2E5AA0;color:#fff;cursor:pointer;transition:background .15s;letter-spacing:.02em}
.btn-primary:hover{background:#3D6DB8}
.btn-primary:disabled{opacity:0.4;cursor:not-allowed}
.btn-secondary{padding:10px 28px;font-size:13px;font-weight:400;border:1.5px solid #2A2A3A;border-radius:6px;background:transparent;color:#9B9BA7;cursor:pointer;transition:all .15s}
.btn-secondary:hover{background:#1C1C2A;border-color:#3A3A4D;color:#E8E8EC}
.info-box{background:#1C1C2A;border-radius:6px;padding:12px 14px;margin-top:8px;font-size:12px;color:#9B9BA7;line-height:1.6;border:1px solid #2A2A3A}
.info-box ol{margin:4px 0 0 16px;padding:0}.info-box li{margin-bottom:3px}
select.zs{width:100%;padding:8px 12px;font-size:14px;border:1.5px solid #2A2A3A;border-radius:6px;background:#151520;color:#E8E8EC;appearance:auto}
select.zs:focus{border-color:#4A7FBF;outline:none}
input[type="text"],input[type="number"]{padding:8px 12px;font-size:14px;border:1.5px solid #2A2A3A;border-radius:6px;background:#151520;color:#E8E8EC;box-sizing:border-box}
input[type="text"]:focus,input[type="number"]:focus{border-color:#4A7FBF;outline:none}
input[type="text"]::placeholder,input[type="number"]::placeholder{color:#4A4A5A}
input[type="checkbox"]{accent-color:#4A7FBF}

/* ── Dashboard header ─────────────────────────────────────────── */
.dash-header{margin-bottom:1.5rem}
.dash-title{font-size:20px;font-weight:500;margin:0 0 4px;color:#E8E8EC}
.dash-sub{font-size:13px;color:#6B6B78;margin:0;font-family:"IBM Plex Mono",monospace}

/* ── Summary stats ────────────────────────────────────────────── */
.summary-row{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:12px;margin-bottom:1.5rem}
.stat-card{background:#151520;border:1px solid #2A2A3A;border-radius:10px;padding:1rem}
.stat-label{font-size:11px;color:#6B6B78;margin:0 0 6px;text-transform:uppercase;letter-spacing:.06em;font-weight:500}
.stat-val{font-size:26px;font-weight:600;margin:0;font-family:"IBM Plex Mono",monospace}
.stat-val.green{color:#4ADE80}.stat-val.amber{color:#FBBF24}

/* ── Pathway table ────────────────────────────────────────────── */
.pw-table{width:100%;border-collapse:collapse;margin-bottom:8px}
.pw-table thead th{font-size:11px;font-weight:500;color:#6B6B78;text-transform:uppercase;letter-spacing:.06em;padding:10px 12px;text-align:left;border-bottom:1px solid #2A2A3A}
.pw-table thead th:nth-child(3){text-align:center}

/* ── Pathway cards (expand/collapse) ──────────────────────────── */
.pw-card{background:#151520;border:1px solid #1E1E2E;border-radius:0;margin-bottom:0;overflow:hidden;border-bottom:1px solid #1E1E2E}
.pw-card:first-child{border-radius:10px 10px 0 0}
.pw-card:last-child{border-radius:0 0 10px 10px}
.pw-card:only-child{border-radius:10px}
.pw-card-head{display:flex;align-items:center;gap:12px;padding:14px 16px;cursor:pointer;transition:background .1s}
.pw-card-head:hover{background:#1A1A28}
.pw-badge{font-size:11px;font-weight:500;padding:4px 12px;border-radius:4px;white-space:nowrap;letter-spacing:.03em;min-width:90px;text-align:center}
.badge-yes{background:rgba(74,222,128,.12);color:#4ADE80;border:1px solid rgba(74,222,128,.25)}
.badge-no{background:rgba(240,149,149,.1);color:#F09595;border:1px solid rgba(240,149,149,.2)}
.badge-cond{background:rgba(251,191,36,.1);color:#FBBF24;border:1px solid rgba(251,191,36,.2)}
.pw-name{font-size:14px;font-weight:500;flex:1;color:#E8E8EC}
.pw-count{font-size:16px;font-weight:600;color:#E8E8EC;white-space:nowrap;font-family:"IBM Plex Mono",monospace;min-width:40px;text-align:right}
.pw-note{font-size:12px;color:#6B6B78;flex:1;text-align:right;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:240px}
.pw-arrow{font-size:10px;color:#4A4A5A;transition:transform .15s;margin-left:4px}.pw-arrow.open{transform:rotate(90deg)}
.pw-detail{display:none;padding:0 16px 16px;border-top:1px solid #1E1E2E;background:#13131E}
.pw-detail.open{display:block;padding-top:14px}

/* ── Detail sections ──────────────────────────────────────────── */
.detail-section{margin-bottom:14px}.detail-section:last-child{margin-bottom:0}
.detail-heading{font-size:10px;font-weight:500;color:#6B6B78;text-transform:uppercase;letter-spacing:.08em;margin:0 0 6px}
.detail-text{font-size:13px;color:#9B9BA7;line-height:1.6;margin:0}
.cite{font-size:11px;color:#555568;font-family:"IBM Plex Mono",monospace}
.stop-pill{display:inline-block;font-size:10px;font-weight:500;padding:3px 8px;border-radius:4px;margin:2px 4px 2px 0;letter-spacing:.02em}
.stop-hard{background:rgba(240,149,149,.12);color:#F09595;border:1px solid rgba(240,149,149,.2)}
.stop-caveat{background:rgba(251,191,36,.1);color:#FBBF24;border:1px solid rgba(251,191,36,.2)}
.wf-step{display:flex;gap:8px;margin-bottom:6px;font-size:13px}
.wf-num{width:20px;height:20px;border-radius:50%;background:#2E5AA0;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;color:#fff;flex-shrink:0;margin-top:1px;font-family:"IBM Plex Mono",monospace}
.wf-text{color:#9B9BA7;line-height:1.5}
.risk-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:8px}
.risk-item{font-size:12px}.risk-label{color:#555568;font-size:11px}.risk-val{font-weight:500;color:#E8E8EC}

/* ── Tabs ─────────────────────────────────────────────────────── */
.tab-row{display:flex;gap:0;margin-bottom:1.25rem;border-bottom:1px solid #1E1E2E}
.tab-btn{padding:10px 18px;font-size:12px;font-weight:500;color:#6B6B78;border:none;background:transparent;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;letter-spacing:.04em;text-transform:uppercase;transition:color .15s}
.tab-btn:hover{color:#9B9BA7}
.tab-btn.active{color:#E8574A;border-bottom-color:#E8574A}

/* ── Caveats ──────────────────────────────────────────────────── */
.caveat-card{background:#151520;border:1px solid #1E1E2E;border-radius:10px;padding:14px 16px;margin-bottom:10px}
.caveat-title{font-size:13px;font-weight:500;margin:0 0 6px;color:#E8E8EC}
.caveat-meta{font-size:12px;color:#9B9BA7;line-height:1.6;margin:0 0 4px}

/* ── Site facts ───────────────────────────────────────────────── */
.facts-grid{display:grid;grid-template-columns:1fr 1fr;gap:0}
.fact-item{padding:10px 0;border-bottom:1px solid #1E1E2E}
.fact-item:nth-child(odd){padding-right:16px}.fact-item:nth-child(even){padding-left:16px}
.fact-label{font-size:11px;color:#555568;margin-bottom:2px;text-transform:uppercase;letter-spacing:.04em;font-weight:500}
.fact-val{font-size:13px;font-weight:500;color:#E8E8EC;font-family:"IBM Plex Mono",monospace}
.section-label{font-size:11px;font-weight:500;color:#6B6B78;text-transform:uppercase;letter-spacing:.06em;margin:16px 0 8px}.section-label:first-child{margin-top:0}

/* ── Lookup ───────────────────────────────────────────────────── */
.lookup-status{font-size:13px;color:#9B9BA7;font-style:italic;margin:12px 0;line-height:1.5}
.lookup-status .spinner{display:inline-block;width:12px;height:12px;border:2px solid #2A2A3A;border-top-color:#6EA4E8;border-radius:50%;animation:spin .6s linear infinite;vertical-align:middle;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}
.lookup-error{background:#2E1010;border:1px solid #5A2020;border-radius:6px;padding:10px 14px;margin:12px 0;font-size:13px;color:#F09595;line-height:1.5}
.lookup-success{background:#0E1E14;border:1px solid #1A3D28;border-radius:6px;padding:12px 14px;margin:12px 0;font-size:13px;color:#4ADE80;line-height:1.5}
.lookup-success .lk-title{font-weight:500;margin-bottom:6px}
.disambig-list{list-style:none;padding:0;margin:8px 0 0}
.disambig-item{padding:10px 14px;border:1px solid #2A2A3A;border-radius:6px;margin-bottom:6px;cursor:pointer;font-size:13px;transition:all .15s;color:#9B9BA7}
.disambig-item:hover{background:#1C1C2A;border-color:#3A3A4D;color:#E8E8EC}
.disambig-addr{font-weight:500;color:#E8E8EC}
.auto-field{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid #1E1E2E;font-size:13px}
.auto-field:last-child{border-bottom:none}
.auto-label{color:#6B6B78;min-width:160px;font-size:12px}
.auto-val{font-weight:500;flex:1;text-align:right;color:#E8E8EC;font-family:"IBM Plex Mono",monospace;font-size:13px}
.auto-badge{display:inline-block;font-size:9px;font-weight:600;padding:2px 6px;border-radius:3px;margin-left:8px;letter-spacing:.05em;text-transform:uppercase}
.auto-badge.api{background:rgba(74,222,128,.1);color:#4ADE80;border:1px solid rgba(74,222,128,.2)}
.auto-badge.manual{background:#1C1C2A;color:#6B6B78}
.override-row{margin-top:12px;padding:12px 14px;background:#1C1C2A;border-radius:6px;border:1px solid #2A2A3A}
.override-row summary{font-size:12px;color:#6B6B78;cursor:pointer;font-weight:500}.override-row summary:hover{color:#9B9BA7}
.override-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px}
.override-item label{display:block;font-size:11px;color:#6B6B78;margin-bottom:3px}
.override-item input,.override-item select{width:100%;padding:6px 8px;font-size:13px;border:1px solid #2A2A3A;border-radius:6px;background:#151520;color:#E8E8EC;box-sizing:border-box}
.override-item input:focus,.override-item select:focus{border-color:#4A7FBF;outline:none}
.data-caveats{margin-top:10px;font-size:11px;color:#555568;line-height:1.6}

/* ── Jurisdiction selector ────────────────────────────────────── */
.jur-card{border:1.5px solid #2A2A3A;border-radius:10px;padding:1.25rem;cursor:pointer;transition:all .15s;margin-bottom:10px;background:#151520}
.jur-card:hover{border-color:#3A3A4D;background:#1A1A28}
.jur-card.sel{border-color:#4A7FBF;background:rgba(46,90,160,.1)}
.jur-card .jur-name{font-size:15px;font-weight:500;margin:0 0 4px;color:#E8E8EC}
.jur-card .jur-desc{font-size:12px;color:#6B6B78;margin:0;line-height:1.5}

/* ── Checkbox row for COS ─────────────────────────────────────── */
.check-row{display:flex;flex-wrap:wrap;gap:8px}
.check-btn{padding:6px 14px;font-size:12px;border:1.5px solid #2A2A3A;border-radius:6px;cursor:pointer;background:transparent;color:#9B9BA7;transition:all .12s}
.check-btn:hover{border-color:#3A3A4D}
.check-btn.sel{background:#2E5AA0;color:#fff;border-color:#2E5AA0}

/* ── Footer ───────────────────────────────────────────────────── */
.footer{border-top:1px solid #1E1E2E;padding:20px 1.5rem;padding-bottom:max(20px,env(safe-area-inset-bottom));margin-top:3rem;display:flex;justify-content:space-between;align-items:center;max-width:860px;margin-left:auto;margin-right:auto}
.footer-left{font-size:11px;color:#555568;font-weight:500;letter-spacing:.06em;text-transform:uppercase;display:flex;align-items:center;gap:6px}
.footer-right{font-size:10px;color:#3A3A4D;letter-spacing:.04em;text-transform:uppercase}
.footer-dot{width:6px;height:6px;border-radius:50%;background:#4ADE80}

/* ── Address lookup row ───────────────────────────────────────── */
.addr-row{display:flex;gap:8px}
.addr-input{flex:1;padding:8px 12px;font-size:14px;border:1.5px solid #2A2A3A;border-radius:6px;background:#151520;color:#E8E8EC;box-sizing:border-box;min-width:0}
.addr-input:focus{border-color:#4A7FBF;outline:none}
.addr-input::placeholder{color:#4A4A5A}
.addr-btn{white-space:nowrap;padding:8px 20px;flex-shrink:0}

/* ── Responsive — Tablet ──────────────────────────────────────── */
@media(max-width:700px){
  .summary-row{grid-template-columns:1fr}
  .facts-grid{grid-template-columns:1fr}
  .fact-item:nth-child(odd){padding-right:0}
  .fact-item:nth-child(even){padding-left:0}
  .pw-note{display:none}
  .override-grid{grid-template-columns:1fr}
}

/* ── Responsive — Mobile ─────────────────────────────────────── */
@media(max-width:480px){
  html{font-size:15px}
  #app{padding:1.25rem 1rem}

  /* Topbar */
  .topbar{padding:10px 1rem;flex-wrap:wrap;gap:6px}
  .topbar-brand{font-size:13px;gap:8px}
  .topbar-brand svg{width:18px;height:18px}
  .topbar-nav{gap:16px}
  .topbar-nav a{font-size:11px}

  /* Progress dots */
  .pg-progress{margin-bottom:1.25rem;flex-wrap:wrap}
  .pg-dot{width:7px;height:7px}
  .pg-dot.cur{width:9px;height:9px}

  /* Form */
  .q-title{font-size:16px}
  .q-sub{font-size:12.5px}
  .radio-row{gap:6px}
  .radio-btn{padding:10px 16px;font-size:13px;flex:1;min-width:0;text-align:center}
  .btn-row{flex-wrap:wrap}
  .btn-primary,.btn-secondary{padding:12px 20px;font-size:14px;flex:1;min-width:0;text-align:center}
  .info-box{font-size:12px;padding:10px 12px}
  select.zs{font-size:15px;padding:10px 12px}
  input[type="text"],input[type="number"]{font-size:15px;padding:10px 12px;width:100% !important;max-width:100%}

  /* Dashboard header */
  .dash-header{margin-bottom:1.25rem}
  .dash-title{font-size:17px}
  .dash-sub{font-size:12px}

  /* Summary stats */
  .summary-row{grid-template-columns:1fr;gap:8px;margin-bottom:1.25rem}
  .stat-card{padding:12px;display:flex;align-items:center;justify-content:space-between}
  .stat-label{margin:0;font-size:11px}
  .stat-val{font-size:22px}

  /* Tabs — horizontal scroll */
  .tab-row{overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;gap:0;flex-wrap:nowrap}
  .tab-row::-webkit-scrollbar{display:none}
  .tab-btn{padding:10px 14px;font-size:11px;white-space:nowrap;flex-shrink:0}

  /* Pathway cards */
  .pw-card-head{padding:12px 14px;gap:8px;flex-wrap:wrap}
  .pw-badge{font-size:10px;padding:3px 10px;min-width:70px;order:1}
  .pw-name{font-size:13px;flex:1;min-width:0;order:2}
  .pw-count{font-size:14px;order:3}
  .pw-arrow{order:4}
  .pw-detail{padding:0 14px 14px}
  .pw-detail.open{padding-top:12px}

  /* Detail sections */
  .detail-heading{font-size:10px}
  .detail-text{font-size:12.5px}
  .risk-row{grid-template-columns:1fr 1fr;gap:8px}
  .risk-item{font-size:12px}
  .wf-step{font-size:12.5px}
  .wf-num{width:18px;height:18px;font-size:9px}

  /* Caveats */
  .caveat-card{padding:12px 14px}
  .caveat-title{font-size:12.5px}
  .caveat-meta{font-size:12px}
  .stop-pill{font-size:9px;padding:2px 6px}
  .cite{font-size:10px}

  /* Facts grid */
  .facts-grid{grid-template-columns:1fr}
  .fact-item{padding:8px 0}
  .fact-item:nth-child(odd){padding-right:0}
  .fact-item:nth-child(even){padding-left:0}
  .fact-label{font-size:10px}
  .fact-val{font-size:12px;word-break:break-word}

  /* GIS lookup */
  .auto-field{flex-direction:column;align-items:flex-start;gap:2px;padding:6px 0}
  .auto-label{min-width:0;font-size:11px}
  .auto-val{text-align:left;font-size:12px;word-break:break-word}
  .lookup-success{padding:10px 12px}
  .lookup-error{font-size:12px;padding:8px 12px}
  .override-row{padding:10px 12px}
  .override-grid{grid-template-columns:1fr;gap:8px}
  .override-item input,.override-item select{font-size:15px;padding:8px 10px}
  .data-caveats{font-size:10px}
  .disambig-item{padding:12px 14px;font-size:13px}

  /* Jurisdiction cards */
  .jur-card{padding:1rem}
  .jur-card .jur-name{font-size:14px}
  .jur-card .jur-desc{font-size:11px}

  /* Check rows (COS) */
  .check-row{gap:6px}
  .check-btn{padding:8px 12px;font-size:12px;flex:1;text-align:center}

  /* Footer */
  .footer{flex-direction:column;gap:8px;align-items:flex-start;padding:16px 1rem}
  .footer-left{font-size:10px}
  .footer-right{font-size:9px}

  /* Section labels */
  .section-label{font-size:10px;margin:12px 0 6px}

  /* Lookup input row — stack on narrow screens */
  .addr-row{flex-direction:column;gap:6px}
  .addr-input{width:100%;font-size:16px;padding:12px}
  .addr-btn{width:100%;padding:12px 20px;font-size:14px}
  .field-help{font-size:11px}
  .gis-link{font-size:11px}

  /* Touch target minimums */
  button,select,.radio-btn,.check-btn,.disambig-item,.jur-card{min-height:44px}
}
</style>
</head>
<body>
<div class="topbar">
  <div class="topbar-brand">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 2L20 5.5V12C20 16.7 16.4 20 12 22C7.6 20 4 16.7 4 12V5.5Z"/><path d="M12 3.5L19 6.5V12C19 16 15.8 19 12 21C8.2 19 5 16 5 12V6.5Z" stroke-width="0.8"/><circle cx="12" cy="11.5" r="2" stroke="#6EA4E8" stroke-width="1"/><circle cx="12" cy="11.5" r="0.8" fill="#4ADE80" stroke="none"/></svg>

/* ═══════════════════════════════════════════════════════════════════
   DENVER — ArcGIS LAYER ENDPOINTS (unchanged from v12)

const GIS_BASE="https://services1.arcgis.com/zdB7qR0BtYrg0Xpl/ArcGIS/rest/services";
const ADDR_LAYER=`${GIS_BASE}/ODC_CITY_LOC_ADDRESSPUBLIC_P/FeatureServer/31/query`;
const PARCEL_LAYER=`${GIS_BASE}/ODC_PROP_PARCELS_A/FeatureServer/245/query`;
const ZONING_LAYER=`${GIS_BASE}/ODC_ZONE_ZONING_A/FeatureServer/209/query`;

const GIS_MI=1609.34;

function gisHav(a1,o1,a2,o2){
  const R=3958.8,dLa=(a2-a1)*Math.PI/180,dLo=(o2-o1)*Math.PI/180;
  const a=Math.sin(dLa/2)**2+Math.cos(a1*Math.PI/180)*Math.cos(a2*Math.PI/180)*Math.sin(dLo/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

function gisNormalize(raw){
  let s=raw.trim().toUpperCase();
  s=s.replace(/,?\s*(DENVER|CO|COLORADO|\d{5}(-\d{4})?)[\s,]*/gi," ").trim();
  const abbrs={"STREET":"ST","AVENUE":"AVE","BOULEVARD":"BLVD","DRIVE":"DR","COURT":"CT","PLACE":"PL","LANE":"LN","CIRCLE":"CIR","PARKWAY":"PKWY","ROAD":"RD"};
  const parts=s.split(/\s+/);
  const last=parts[parts.length-1];
  if(abbrs[last])parts[parts.length-1]=abbrs[last];
  return parts.join(" ");
}

/* ═══════════════════════════════════════════════════════════════════
   FETCH WRAPPER — timeout + retry for mobile reliability
   ═══════════════════════════════════════════════════════════════════ */
function fetchWithTimeout(url,ms=15000){
  const ctrl=new AbortController();
  const timer=setTimeout(()=>ctrl.abort(),ms);
  return fetch(url,{signal:ctrl.signal,mode:"cors"}).then(r=>{clearTimeout(timer);return r}).catch(e=>{clearTimeout(timer);throw e});
}
async function fetchRetry(url,retries=2,ms=15000){
  for(let i=0;i<=retries;i++){
    try{return await fetchWithTimeout(url,ms)}
    catch(e){if(i===retries)throw new Error(`${e.name==="AbortError"?"Request timed out after "+(ms/1000)+"s":e.message} (attempt ${i+1}/${retries+1})`)}
  }
}

async function gisFindAddresses(raw){
  const norm=gisNormalize(raw);
  const queries=[`FULL_ADDRESS='${norm}'`,`FULL_ADDRESS LIKE '${norm}%'`];
  const m=norm.match(/^(\d+)\s+(.+?)(?:\s+(ST|AVE|BLVD|DR|CT|PL|LN|WAY|CIR|PKWY|RD))?\s*$/);
  if(m){const num=m[1];const street=m[2].replace(/^[NSEW]\s+/,"");queries.push(`ADDRESS_NUMBER=${num} AND STREET_NAME LIKE '${street}%'`)}
  for(const where of queries){
    const url=`${ADDR_LAYER}?where=${encodeURIComponent(where)}&outFields=FULL_ADDRESS,LATITUDE,LONGITUDE&returnGeometry=false&resultRecordCount=10&f=json`;
    const res=await fetchRetry(url);const data=await res.json();
    const feats=(data.features||[]).map(f=>f.attributes);
    if(feats.length>0){
      if(feats.length===1)return feats;
      const bases=new Map();
      for(const f of feats){const base=f.FULL_ADDRESS.replace(/\s+(APT|UNIT|STE|#)\s+\S+$/i,"");if(!bases.has(base))bases.set(base,f)}
      return Array.from(bases.values());
    }
  }
  return[];
}

async function gisQueryLayers(lat,lon){
  const geom=`${lon}%2C${lat}`;
  const[parcelRes,zoningRes,rcRes]=await Promise.all([
    fetchRetry(`${PARCEL_LAYER}?geometry=${geom}&geometryType=esriGeometryPoint&inSR=4326&spatialRel=esriSpatialRelIntersects&outFields=SITUS_ADDRESS_LINE1,LAND_AREA,ZONE_10,ZONE_ID,D_CLASS_CN,PROP_CLASS,OWNER_NAME,APPRAISED_TOTAL_VALUE,LEGAL_DESC,Shape__Area,SALE_DATE,SALE_PRICE,RES_ORIG_YEAR_BUILT,COM_ORIG_YEAR_BUILT,TOT_UNITS&returnGeometry=false&f=json`),
    fetchRetry(`${ZONING_LAYER}?geometry=${geom}&geometryType=esriGeometryPoint&inSR=4326&spatialRel=esriSpatialRelIntersects&outFields=ZONE_DISTRICT,ZONE_DESCRIPTION,ZONE_USE_FORM,NBHD_CONTEXT,ZONE_DIST_TYPE&returnGeometry=false&f=json`),
    fetchRetry(`${RC_LAYER}?geometry=${geom}&geometryType=esriGeometryPoint&inSR=4326&spatialRel=esriSpatialRelIntersects&distance=${GIS_MI}&units=esriSRUnit_Meter&outFields=FACILITY_NAME,FACILITY_ADDRESS,RES_CARE_TYPE&returnGeometry=true&outSR=4326&f=json`)
  ]);
  const parcelData=await parcelRes.json();const zoningData=await zoningRes.json();const rcData=await rcRes.json();
  let parcel=null;const parcelCount=parcelData.features?.length||0;
  if(parcelCount===1)parcel=parcelData.features[0].attributes;
  else if(parcelCount>1)parcel=parcelData.features.map(f=>f.attributes).sort((a,b)=>(b.LAND_AREA||0)-(a.LAND_AREA||0))[0];
  const facilities=(rcData.features||[]).map(f=>{
    const d=gisHav(lat,lon,f.geometry.y,f.geometry.x);
    return{name:f.attributes.FACILITY_NAME,addr:f.attributes.FACILITY_ADDRESS,type:f.attributes.RES_CARE_TYPE,mi:d,ft:Math.round(d*5280)};
  }).sort((a,b)=>a.mi-b.mi);
  return{parcel,parcelCount,zoning:zoningData.features?.length?zoningData.features[0].attributes:null,facilities};
}

/* ═══════════════════════════════════════════════════════════════════

   ═══════════════════════════════════════════════════════════════════ */
const COS_GIS="https://gis.coloradosprings.gov/arcgis/rest/services/GeneralUse";

const COS_PARCEL=`${COS_GIS}/LandRecords/MapServer/4/query`;

const COS_USEVAR=`${COS_GIS}/PlanningLandUseEntitlements/MapServer/3/query`;

  streamside:{url:`${COS_GIS}/PlanningZoning/MapServer/5/query`,fields:"buf,type"},
  historic:{url:`${COS_GIS}/PlanningZoning/MapServer/7/query`,fields:"OBJECTID"},
  nna:{url:`${COS_GIS}/PlanningZoning/MapServer/8/query`,fields:"SECTOR,ECP_Zoning_Code"},

function cosNormalize(raw){
  let s=raw.trim().toUpperCase();
  s=s.replace(/,?\s*(COLORADO\s+SPRINGS|COS|CO|COLORADO|\d{5}(-\d{4})?)[\s,]*/gi," ").trim();
  const abbrs={"STREET":"ST","AVENUE":"AVE","BOULEVARD":"BLVD","DRIVE":"DR","COURT":"CT","PLACE":"PL","LANE":"LN","CIRCLE":"CIR","PARKWAY":"PKWY","ROAD":"RD","TERRACE":"TER","WAY":"WAY","NORTH":"N","SOUTH":"S","EAST":"E","WEST":"W"};
  return s.split(/\s+/).map(p=>abbrs[p]||p).join(" ");
}

async function cosFindAddresses(raw){
  const norm=cosNormalize(raw);
  const queries=[`FullAddress='${norm}'`,`FullAddress LIKE '${norm}%'`];
  const m=norm.match(/^(\d+)\s+([NSEW]\s+)?(.+?)(?:\s+(ST|AVE|BLVD|DR|CT|PL|LN|WAY|CIR|PKWY|RD|TER))?\s*$/);
  if(m){queries.push(`Add_Number=${m[1]} AND FullAddress LIKE '%${m[3]}%'`)}
  for(const where of queries){
    const url=`${COS_ADDR}?where=${encodeURIComponent(where)}&outFields=FullAddress,Add_Number&returnGeometry=true&outSR=4326&resultRecordCount=10&f=json`;
    const res=await fetchRetry(url);const data=await res.json();
    const feats=(data.features||[]).map(f=>({...f.attributes,x:f.geometry.x,y:f.geometry.y}));

      const bases=new Map();
      for(const f of feats){const base=f.FullAddress.replace(/\s+(APT|UNIT|STE|#)\s+\S+$/i,"");if(!bases.has(base))bases.set(base,f)}

async function cosQueryLayers(lat,lon){
  const geom=`${lon},${lat}`;
  const gP=`geometry=${encodeURIComponent(geom)}&geometryType=esriGeometryPoint&inSR=4326&spatialRel=esriSpatialRelIntersects&returnGeometry=false&f=json`;
  const coreFetches=[
    fetchRetry(`${COS_PARCEL}?${gP}&outFields=PARCEL,ZONING,MAINADDRES,OwnerName,ACREAGE,LEGAL,Shape_Area,CITY,type`).then(r=>r.json()),
    fetchRetry(`${COS_ZONING}?${gP}&outFields=LABEL,DESCRIPT,ECP_Zoning_Code,ECP_Zone_Description`).then(r=>r.json()),
  ];
  const overlayFetches=Object.entries(COS_OVERLAYS).map(([key,layer])=>
    fetchRetry(`${layer.url}?${gP}&outFields=${layer.fields}`).then(r=>r.json()).then(d=>({key,features:d.features||[]})).catch(()=>({key,features:[]}))
  );
  const cdpheFetch=fetchRetry(`${COS_CDPHE}?geometry=${encodeURIComponent(geom)}&geometryType=esriGeometryPoint&inSR=4326&spatialRel=esriSpatialRelIntersects&distance=${GIS_MI}&units=esriSRUnit_Meter&outFields=Facility_Name,Facility_Type,Facility_Type_Detail,Address_Full,Licensed_Beds_Total,Operating_Status,Latitude,Longitude&returnGeometry=true&outSR=4326&resultRecordCount=200&f=json`).then(r=>r.json()).catch(()=>({features:[]}));
  const cupFetch=fetchRetry(`${COS_CUP}?${gP}&outFields=FILE_NUM`).then(r=>r.json()).catch(()=>({features:[]}));
  const uvFetch=fetchRetry(`${COS_USEVAR}?${gP}&outFields=FILE_NUM`).then(r=>r.json()).catch(()=>({features:[]}));
  const[parcelRes,zoningRes,...rest]=await Promise.all([...coreFetches,...overlayFetches,cdpheFetch,cupFetch,uvFetch]);
  const oLen=Object.keys(COS_OVERLAYS).length;
  const overlayResults=rest.slice(0,oLen);
  const cdpheData=rest[oLen];const cupData=rest[oLen+1];const uvData=rest[oLen+2];
  let parcel=null;const parcelCount=parcelRes.features?.length||0;
  if(parcelCount===1)parcel=parcelRes.features[0].attributes;
  else if(parcelCount>1)parcel=parcelRes.features.map(f=>f.attributes).sort((a,b)=>(b.ACREAGE||0)-(a.ACREAGE||0))[0];
  const zoning=zoningRes.features?.length?zoningRes.features[0].attributes:null;
  const overlays={};
  overlayResults.forEach(o=>{overlays[o.key]=o.features});
  const facilities=(cdpheData.features||[]).map(f=>{
    const a=f.attributes;const d=gisHav(lat,lon,f.geometry.y,f.geometry.x);
    return{name:a.Facility_Name,type:a.Facility_Type,beds:a.Licensed_Beds_Total,status:a.Operating_Status,mi:d,ft:Math.round(d*5280)};
  }).sort((a,b)=>a.mi-b.mi);
  const cupFiles=(cupData.features||[]).map(f=>f.attributes.FILE_NUM).filter(Boolean);
  const uvFiles=(uvData.features||[]).map(f=>f.attributes.FILE_NUM).filter(Boolean);
  // Detect overlays
  const activeOverlays=[];
  if(overlays.streamside?.length)activeOverlays.push("SS-O");
  if(overlays.historic?.length)activeOverlays.push("HP-O");
  if(overlays.hillside?.length)activeOverlays.push("HS-O");
  let airportOverlay=null;
  if(overlays.airport?.length){airportOverlay=overlays.airport[0].attributes.ECP_Zoning_Code||"AP-O";activeOverlays.push(airportOverlay)}
  let apzType=null;
  if(overlays.apz?.length){apzType=overlays.apz[0].attributes.APZType;if(apzType)activeOverlays.push("AP-O: "+apzType)}
  let nnaSector=null;
  if(overlays.nna?.length){nnaSector=overlays.nna[0].attributes.SECTOR;activeOverlays.push("NNA-O"+(nnaSector?" "+nnaSector:""))}
  let effectiveZone=zoning?zoning.LABEL:null;
  if(nnaSector)effectiveZone="NNA-O "+nnaSector;
  const lotAcres=parcel?parcel.ACREAGE:null;
  const shapeArea=parcel&&parcel.Shape_Area?Math.round(parcel.Shape_Area):null;
  const lotSqFt=lotAcres?Math.round(lotAcres*43560):shapeArea;
  return{parcel,parcelCount,zoning,effectiveZone,zoningLabel:zoning?zoning.LABEL:null,zoningDesc:zoning?(zoning.ECP_Zone_Description||zoning.DESCRIPT):null,lotSqFt,activeOverlays,nnaSector,apzType,facilities,cupFiles,uvFiles,alrCount:facilities.filter(f=>f.type==="Assisted Living Residence").length};
}

function isSU(z){return/^[A-Z]-SU/.test(z)}function isTU(z){return/^[A-Z]-TU/.test(z)}function isRH25(z){return/RH-2\.5/.test(z)}function isSU_TU_RH25(z){return isSU(z)||isTU(z)||isRH25(z)}
function isAnyRH(z){return/^[A-Z]-RH/.test(z)||/^M-RH/.test(z)}function isSU_TU_anyRH(z){return isSU(z)||isTU(z)||isAnyRH(z)}

const CCN_SP=new Set(["C-CCN-3","C-CCN-4","C-CCN-5","C-CCN-7","C-CCN-8"]);
function hasMU(z){return/-(MU)-/.test(z)&&!/MU-2\.5/.test(z)}
function hasRO(z){return/-RO-/.test(z)}

function hasMX(z){return/-MX-/.test(z)||/-IMX-/.test(z)||/-GMX/.test(z)}
function hasCC(z){return/-CC-/.test(z)&&!/C-CCN/.test(z)}
function hasMS(z){return/-MS-/.test(z)}
function isCCN12(z){return z==="C-CCN-12"}
function isDASGT(z){return/^D-(AS|GT)/.test(z)}
function isDtNS(z){return/^D-(C$|TD|LD|CV|CPV)/.test(z)}
function isCMP(z){return/^CMP-/.test(z)}
function isIAIB(z){return z==="I-A"||z==="I-B"}
function getSp(z){
  if(hasMU(z)||hasRO(z)||hasRX(z))return{d:1200,c3:"§ 11.2.11.2",c4:"§ 11.2.12.2"};
  if(hasCC(z)||hasMX(z)||hasMS(z)||CCN_SP.has(z))return{d:600,c3:"§ 11.2.11.3",c4:"§ 11.2.12.3"};
  if(isDASGT(z))return{d:400,c3:"§ 11.2.11.4",c4:"§ 11.2.12.4"};
  return null;
}

// Overlay Table 7.3.2-B modifications
// Returns modified permission or null (pass-through)
function cosOverlayMod(overlays,useKey){
  if(!overlays||!overlays.length)return null;
  // AP-O: ADNL -> C for all
  if(overlays.includes("AP-O: ADNL"))return"C";
  // AP-O: RPZ -> pass-through (null)
  if(overlays.some(o=>o.includes("RPZ")))return null;
  // AP-O: APZ-1, APZ-2, ANAV -> P for all
  if(overlays.some(o=>o.includes("APZ-1")||o.includes("APZ-2")||o.includes("ANAV")))return"P";
  // SS-O -> P (doesn't restrict)
  if(overlays.includes("SS-O"))return null;
  return null;
}

function getPages(){
  if(!ST.jurisdiction)return[{id:"jurisdiction"}];
  if(ST.jurisdiction==="denver")return getDenverPages();
  return getCOSPages();
}

function getDenverPages(){
  const p=[{id:"addressLookup"},{id:"zone"}];const z=ST.form.zone;if(!z)return p;
  const ut=UT[z];if(!ut)return p;
  if(ut.t1==="NP"&&ut.t2==="NP"&&ut.t3==="NP"&&ut.t4==="NP"){p.push({id:"allNP"});return p}
  p.push({id:"licensing"},{id:"correctional"},{id:"op24hr"},{id:"overnight"});
  if(ut.t1!=="NP")p.push({id:"religious"});
  p.push({id:"existingRC"});
  if(ST.form.existingRC==="yes")p.push({id:"maintained"});
  if(isSU_TU_anyRH(z))p.push({id:"lotSize"});
  if(isSU_TU_RH25(z)||ut.t4!=="NP")p.push({id:"rcWithin1mi"});
  if(ut.t4!=="NP")p.push({id:"rcType34within1mi"});
  if(ut.t3!=="NP"||ut.t4!=="NP")p.push({id:"distType34"});
  p.push({id:"review"});return p;
}

function getCOSPages(){
  const p=[{id:"cosAddressLookup"},{id:"cosZone"}];const z=ST.form.zone;if(!z)return p;
  const ut=COS_UT[z];if(!ut)return p;
  // Check if anything is permitted at all
  const allN=Object.values(ut).every(v=>v==="N");
  if(allN){p.push({id:"allNP"});return p}
  p.push({id:"licensing"},{id:"correctional"},{id:"cosFHA"});
  // If FBZ or PDZ, ask about plan
  if(z==="FBZ")p.push({id:"cosFBZ"});
  if(z==="PDZ")p.push({id:"cosPDZ"});
  p.push({id:"op24hr"});
  // Population-specific questions
  p.push({id:"cosPopulation"});
  // Separation — only matters for GLR/Detox pathways
  const hasGLR=ut.glrS!=="N"||ut.glrM!=="N"||ut.glrL!=="N"||ut.detox!=="N";
  if(hasGLR)p.push({id:"cosDistance"});
  // Construction type
  p.push({id:"cosConstruction"});
  // Existing use
  p.push({id:"existingRC"});
  if(ST.form.existingRC==="yes")p.push({id:"maintained"});
  p.push({id:"review"});return p;
}

function advance(){const pages=getPages();if(ST.pg<pages.length-1)ST.pg++;render()}
function goBack(){if(ST.pg>0){ST.pg--;render()}}

async function gisStartLookup(){
  const raw=document.getElementById("gis-addr").value.trim();
  if(!raw)return;
  ST.form.address=raw;ST.gisPhase="searching";ST.gisError=null;render();
  try{
    const addrs=await gisFindAddresses(raw);
    if(addrs.length===0){ST.gisPhase="error";ST.gisError="No matching address found in Denver\u2019s address point layer. Check spelling or include the directional (N/S/E/W).";render();return}
    if(addrs.length===1){await gisRunWithAddress(addrs[0])}
    else{ST.gisPhase="disambig";ST.gisAddresses=addrs;render()}
  }catch(err){
    const msg=err.message||String(err);
    const isMobileBlock=msg.includes("Load failed")||msg.includes("Failed to fetch")||msg.includes("NetworkError")||msg.includes("timed out");
    ST.gisPhase="error";
    ST.gisError=isMobileBlock
      ?"Network request blocked or timed out. This can happen on mobile browsers opening local files. Try: (1) open this page from a web server instead of a file, or (2) skip the lookup and enter data manually."
      :"ArcGIS query failed: "+msg+". You can skip the lookup and enter data manually.";
    render();
  }
}

async function gisSelectAddress(idx){
  ST.gisPhase="querying";render();
  try{await gisRunWithAddress(ST.gisAddresses[idx])}
  catch(err){ST.gisPhase="error";const msg=err.message||String(err);ST.gisError=(msg.includes("Load failed")||msg.includes("Failed to fetch")||msg.includes("timed out"))?"Network request blocked or timed out on mobile. Skip lookup and enter data manually, or open from a hosted URL.":"Layer query failed: "+msg+". You can skip and enter data manually.";render()}
}

async function gisRunWithAddress(addr){
  ST.gisPhase="querying";render();
  const lat=addr.LATITUDE,lon=addr.LONGITUDE;
  try{
    const data=await gisQueryLayers(lat,lon);
    const z=data.zoning;const p=data.parcel;
    const zoningZone=z?z.ZONE_DISTRICT:null;const landArea=p?p.LAND_AREA:null;
    const totalRC=data.facilities.length;
    const t34=data.facilities.filter(f=>f.type==="Type 3"||f.type==="Type 4");
    const t34c=t34.length;const nearest34=t34.length?t34[0]:null;
    ST.gisData={parcel:p,zoning:z,facilities:data.facilities,matchedAddr:addr.FULL_ADDRESS,lat,lon,parcelCount:data.parcelCount};
    ST.gisAutoZone=zoningZone;ST.gisAutoLot=landArea;ST.gisAutoRC=totalRC;ST.gisAutoRC34=t34c;ST.gisAutoDist34=nearest34?nearest34.ft:null;
    if(zoningZone&&ZL.includes(zoningZone)){ST.form.zone=zoningZone}
    if(landArea)ST.form.lotSize=landArea;
    ST.form.rcWithin1mi=totalRC;ST.form.rcType34within1mi=t34c;ST.form.distType34=nearest34?nearest34.ft:null;
    ST.form.address=addr.FULL_ADDRESS;ST.gisPhase="done";render();
  }catch(err){ST.gisPhase="error";const msg=err.message||String(err);ST.gisError=(msg.includes("Load failed")||msg.includes("Failed to fetch")||msg.includes("timed out"))?"Network request blocked or timed out on mobile. Skip lookup and enter data manually, or open from a hosted URL.":"Layer query failed: "+msg+". You can skip and enter data manually.";render()}
}

function gisSkip(){ST.gisPhase="skipped";render()}
function gisApplyAndContinue(){
  const ov=ST.gisOverrides;
  if(ov.zone!==undefined)ST.form.zone=ov.zone||null;
  if(ov.lotSize!==undefined)ST.form.lotSize=ov.lotSize===""?null:Number(ov.lotSize);
  if(ov.rcWithin1mi!==undefined)ST.form.rcWithin1mi=ov.rcWithin1mi===""?null:Number(ov.rcWithin1mi);
  if(ov.distType34!==undefined)ST.form.distType34=ov.distType34===""?null:Number(ov.distType34);
  if(ov.rcType34within1mi!==undefined)ST.form.rcType34within1mi=ov.rcType34within1mi===""?null:Number(ov.rcType34within1mi);
  advance();
}

async function cosGisStart(){
  const raw=document.getElementById("cos-addr").value.trim();
  if(!raw)return;
  ST.form.address=raw;ST.gisPhase="searching";ST.gisError=null;render();
  try{
    const addrs=await cosFindAddresses(raw);
    if(addrs.length===0){ST.gisPhase="error";ST.gisError="No matching address in Colorado Springs address point layer. Try including the directional (N/S/E/W) or check spelling.";render();return}
    if(addrs.length===1){await cosGisRun(addrs[0])}
    else{ST.gisPhase="disambig";ST.gisAddresses=addrs;render()}
  }catch(err){ST.gisPhase="error";ST.gisError="ArcGIS query failed: "+(err.message||err)+". You can skip and enter data manually.";render()}
}

async function cosGisSelect(idx){
  ST.gisPhase="querying";render();
  try{await cosGisRun(ST.gisAddresses[idx])}
  catch(err){ST.gisPhase="error";const msg=err.message||String(err);ST.gisError=(msg.includes("Load failed")||msg.includes("Failed to fetch")||msg.includes("timed out"))?"Network request blocked or timed out on mobile. Skip lookup and enter data manually, or open from a hosted URL.":"Layer query failed: "+msg+". You can skip and enter data manually.";render()}
}

async function cosGisRun(addr){
  ST.gisPhase="querying";render();
  const lat=addr.y,lon=addr.x;
  try{
    const data=await cosQueryLayers(lat,lon);
    ST.gisData={...data,matchedAddr:addr.FullAddress,lat,lon};
    ST.gisAutoZone=data.effectiveZone;
    ST.gisAutoLot=data.lotSqFt;
    ST.cosAutoOverlays=data.activeOverlays;
    ST.cosAutoNNA=data.nnaSector;
    ST.cosAutoAPZ=data.apzType;
    ST.cosAutoFacilities=data.facilities;
    ST.cosAutoALR=data.alrCount;
    ST.cosAutoCUP=data.cupFiles;
    ST.cosAutoUV=data.uvFiles;
    // Compute nearest ALR/nursing facility distance as proxy for GLR/Detox separation
    const relevantFac=data.facilities.filter(f=>f.type==="Assisted Living Residence"||f.type==="Nursing Facilities");
    const nearestRelevant=relevantFac.length?relevantFac[0]:null;
    ST.cosAutoNearestFacDist=nearestRelevant?nearestRelevant.ft:null;
    ST.cosAutoNearestFacName=nearestRelevant?nearestRelevant.name:null;
    ST.cosAutoNearestFacIsALR=nearestRelevant?nearestRelevant.type==="Assisted Living Residence":false;
    // Auto-populate form
    if(data.effectiveZone&&COS_ZL.includes(data.effectiveZone))ST.form.zone=data.effectiveZone;
    if(data.lotSqFt)ST.form.lotSize=data.lotSqFt;
    ST.form.cosOverlays=data.activeOverlays.filter(o=>o.startsWith("AP-O")||o==="SS-O"||o==="HP-O"||o==="HS-O");
    if(nearestRelevant){ST.form.distGLRDetox=nearestRelevant.ft;if(nearestRelevant.type==="Assisted Living Residence")ST.form.nearestAL="yes"}
    ST.form.address=addr.FullAddress;
    ST.gisPhase="done";render();
  }catch(err){ST.gisPhase="error";const msg=err.message||String(err);ST.gisError=(msg.includes("Load failed")||msg.includes("Failed to fetch")||msg.includes("timed out"))?"Network request blocked or timed out on mobile. Skip lookup and enter data manually, or open from a hosted URL.":"Layer query failed: "+msg+". You can skip and enter data manually.";render()}
}

function cosGisApply(){
  const ov=ST.gisOverrides;
  if(ov.zone!==undefined)ST.form.zone=ov.zone||null;
  if(ov.lotSize!==undefined)ST.form.lotSize=ov.lotSize===""?null:Number(ov.lotSize);
  advance();
}

      h+=`<label style="display:flex;align-items:center;gap:8px;font-size:13px;padding:8px 0;cursor:pointer;"><input type="checkbox" ${f.targetTerminal?"checked":""} onchange="ST.form.targetTerminal=this.checked;render()"> ≥ 9 terminally ill residents, life expectancy &lt; 6 months (Hospice eligibility)</label>`;
      h+=`<label style="display:flex;align-items:center;gap:8px;font-size:13px;padding:8px 0;cursor:pointer;"><input type="checkbox" ${f.tempShelter?"checked":""} onchange="ST.form.tempShelter=this.checked;render()"> Temporary shelter model, generally unlicensed (Human Services Shelter)</label></div>`;
      h+=`<div class="btn-row">${bk}${nx}</div>`;
    }
    else if(page.id==="cosDistance"){
      const autoFac=ST.gisPhase==="done"&&ST.cosAutoNearestFacDist!=null;
      h+=`<p class="q-title">Distance to nearest GLR or Detox Center</p><p class="q-sub">The 1,000-ft separation rule (§ 7.3.301E.1.a) applies to GLR and Detoxification Center uses. Enter distance in feet, or leave blank if unknown.`;
      if(autoFac)h+=` <span style="color:#4ADE80;">Auto-populated from CDPHE (nearest: ${esc(ST.cosAutoNearestFacName)}, ${ST.cosAutoNearestFacDist.toLocaleString()} ft).</span>`;
      else if(ST.gisPhase==="done"&&ST.cosAutoNearestFacDist==null)h+=` <span style="color:#4ADE80;">No CDPHE-licensed residential facilities found within 1 mile.</span>`;
      h+=`</p>`;
      h+=`<input type="number" id="cos-dist" value="${f.distGLRDetox===null?"":f.distGLRDetox}" placeholder="e.g. 1500" style="width:220px;">`;
      if(autoFac)h+=`<div class="field-help" style="color:#4ADE80;">Source: CDPHE statewide health facility layer <span class="auto-badge api" style="vertical-align:middle;">API</span></div>`;
      h+=`<div style="margin-top:12px;"><label style="display:flex;align-items:center;gap:8px;font-size:13px;cursor:pointer;"><input type="checkbox" ${f.nearestAL==="yes"?"checked":""} onchange="ST.form.nearestAL=this.checked?'yes':'no';render()"> Nearest GLR/Detox is licensed as assisted living (§ 7.3.301E.1.b exception)</label></div>`;
      h+=`<div class="field-help">Exception: separation rule does not apply between two establishments both licensed as assisted living.</div>`;
      h+=`<div class="field-help" style="margin-top:8px;color:#555568;">Note: CDPHE data shows state-licensed health facilities (ALR, nursing). This does not map 1:1 to UDC Group Living Residences or Detox Centers. Verify classification with COS Planning.</div>`;
      h+=`<div class="btn-row">${bk}<button class="btn-primary" onclick="var v=document.getElementById('cos-dist').value;ST.form.distGLRDetox=v===''?null:Number(v);advance()">Next</button></div>`;
    }
    else if(page.id==="cosConstruction"){
      h+=`<p class="q-title">Construction type</p><p class="q-sub">This determines whether a Development Plan is required. (§ 7.5.515B)</p>`;
      h+=`<div class="radio-row">`;
      ["new","conversion","existing"].forEach(v=>{
        const label=v==="new"?"New construction":v==="conversion"?"Conversion of existing structure":"Existing structure — no change";
        h+=`<button class="radio-btn ${f.constructionType===v?"sel":""}" onclick="ST.form.constructionType='${v}';render()">${label}</button>`;
      });
      h+=`</div>`;
      h+=`<div class="field-help">Conversion of existing single-family/two-family on a platted lot is exempt from Dev Plan (§ 7.5.515B.2.a).</div>`;
      h+=`<div class="btn-row">${bk}${f.constructionType?nx:""}</div>`;
    }
    else if(page.id==="existingRC"){h+=`<p class="q-title">Existing group living use</p><p class="q-sub">Is there an existing group living or human services use on this lot?</p><div class="radio-row">${r3("existingRC",f.existingRC)}</div><div class="btn-row">${bk}${f.existingRC!==null?nx:""}</div>`}
    else if(page.id==="maintained"){h+=`<p class="q-title">Continuously maintained?</p><p class="q-sub">Has the existing use been continuously maintained? Discontinuance for 12+ months loses nonconforming status. (§ 7.5.804E)</p><div class="radio-row">${r3("maintained",f.maintained)}</div><div class="btn-row">${bk}${f.maintained!==null?nx:""}</div>`}
    else if(page.id==="review"){h+=`<p class="q-title">Review and run</p><p class="q-sub">Confirm your inputs, then run the analysis.</p>`;h+=rFacts();h+=`<div class="btn-row">${bk}<button class="btn-primary" onclick="go()">Run analysis</button></div>`}
  }
  APP.innerHTML=h;
}

/* ═══════════════════════════════════════════════════════════════════
   SHARED HELPERS
   ═══════════════════════════════════════════════════════════════════ */
function setR(k,v){ST.form[k]=v;render()}
function r2(k,v){return`<button class="radio-btn ${v==="yes"?"sel":""}" onclick="setR('${k}','yes')">Yes</button><button class="radio-btn ${v==="no"?"sel":""}" onclick="setR('${k}','no')">No</button>`}
function r3(k,v){return`<button class="radio-btn ${v==="yes"?"sel":""}" onclick="setR('${k}','yes')">Yes</button><button class="radio-btn ${v==="no"?"sel":""}" onclick="setR('${k}','no')">No</button><button class="radio-btn ${v==="unknown"?"sel":""}" onclick="setR('${k}','unknown')">Unknown</button>`}
function esc(s){return(s||"").replace(/&/g,"&amp;").replace(/"/g,"&quot;").replace(/</g,"&lt;")}

function rFacts(){
  const f=ST.form;
  const items=[["Jurisdiction",ST.jurisdiction==="denver"?"Denver":"Colorado Springs"],["Address",esc(f.address)||"\u2014"],["Zone",f.zone||"\u2014"]];
  if(f.lotSize!=null)items.push(["Lot size",f.lotSize.toLocaleString()+" sf"]);
  items.push(["Licensing",f.licensing||"\u2014"]);
  if(ST.jurisdiction==="denver"){
    items.push(["Correctional",f.correctional||"\u2014"],["24-hour",f.op24hr||"\u2014"],["Overnight",f.overnight||"\u2014"]);
    if(f.religious!=null)items.push(["Religious assembly",f.religious]);
    items.push(["Existing RC",f.existingRC||"\u2014"]);
    if(f.existingRC==="yes")items.push(["Maintained",f.maintained||"\u2014"]);
    if(f.rcWithin1mi!=null)items.push(["RC within 1 mi",String(f.rcWithin1mi)]);
    if(f.rcType34within1mi!=null)items.push(["Type 3/4 within 1 mi",String(f.rcType34within1mi)]);
    if(f.distType34!=null)items.push(["Dist. to nearest 3/4",f.distType34.toLocaleString()+" ft"]);
  } else {
    items.push(["Correctional",f.correctional||"\u2014"],["FHA-protected",f.fhaProtected||"\u2014"],["24-hour",f.op24hr||"\u2014"]);
    if(f.targetOver60)items.push(["Over 60 population","Yes"]);
    if(f.targetTerminal)items.push(["Terminal/hospice","Yes"]);
    if(f.tempShelter)items.push(["Temporary shelter","Yes"]);
    items.push(["Construction",f.constructionType||"\u2014"]);
    if(f.distGLRDetox!=null)items.push(["Dist. to GLR/Detox",f.distGLRDetox.toLocaleString()+" ft"]);
    if(f.nearestAL==="yes")items.push(["Nearest is AL","Yes"]);
    items.push(["Existing use",f.existingRC||"\u2014"]);
    if(f.existingRC==="yes")items.push(["Maintained",f.maintained||"\u2014"]);
    if(f.cosOverlays?.length)items.push(["Overlays",f.cosOverlays.join(", ")]);
  }
  let h=`<div class="facts-grid">`;items.forEach(([l,v])=>{h+=`<div class="fact-item"><div class="fact-label">${l}</div><div class="fact-val">${v}</div></div>`});return h+`</div>`;
}

function go(){
  if(ST.jurisdiction==="denver")ST.results=runEngine(ST.form);
  else ST.results=runCOSEngine(ST.form);
  ST.activeTab="dashboard";ST.expanded={};render();
}

/* ═══════════════════════════════════════════════════════════════════
   DENVER RULE ENGINE (locked — unchanged from v11)
   ═══════════════════════════════════════════════════════════════════ */
function runEngine(f){
  const z=f.zone,ut=UT[z];if(!ut)return{error:"Zone not found."};
  const lot=f.lotSize||0,rcN=f.rcWithin1mi||0,rc34=f.rcType34within1mi||0,d34=f.distType34||999999,cor=f.correctional==="yes",rel=f.religious==="yes",lic=f.licensing,exRC=f.existingRC,mnt=f.maintained;
  const R=[],gS=[],gC=[];
  if(lic==="no")gS.push({msg:"Cannot obtain licensing/certification",cite:"§ 11.2.8.1.B.1"});
  if(lic==="unknown")gC.push({msg:"Licensing status unknown",cite:"§ 11.2.8.1.B.1",blocking:true,resolve:"Confirm with CPD and state agency."});
  if(cor)gC.push({msg:"Correctional supervision — DPS referral mandatory",cite:"§ 11.2.8.1.B.2",blocking:false,resolve:"Contact DPS before filing."});
  if(f.op24hr==="no")gC.push({msg:"Less-than-24-hour conditions apply",cite:"§ 11.2.8.1.B.3",blocking:false,resolve:"Address in operational plan."});
  if(gS.length)return{zone:z,gS,gC,results:[],p2:"fail"};

  function tP(id,nm,th,tk,fn){const el=ut[tk];if(el==="NP"){R.push({id,nm,th,v:"no",mg:null,stops:[{msg:"Not permitted in "+z,cite:"Use Table"}],cav:[],proc:el,rat:"",wf:[],rsk:{},rank:"Not viable"});return}const pw={id,nm,th,v:"yes",mg:null,stops:[],cav:[...gC],proc:el,rat:"",wf:[],rsk:{},rank:""};fn(pw);if(pw.stops.length)pw.v="no";else if(pw.cav.some(c=>c.blocking))pw.v="conditional";R.push(pw)}

  tP("P1","Type 1","Up to 10 guests","t1",pw=>{
    pw.mg=10;
    if(isSU_TU_RH25(z)&&cor){pw.stops.push({msg:"Correctional prohibited in SU/TU/RH-2.5",cite:"§ 11.2.9.2.A"});return}
    if(isSU_TU_RH25(z)&&rcN>3){pw.stops.push({msg:"Density: "+rcN+" RC within 1 mi (max 3)",cite:"§ 11.2.9.2.B"});return}
    if(isMRH3(z))pw.cav.push({msg:"M-RH-3: Type 1 density applicability ambiguous",cite:"§ 11.2.9.2/§ 9.7.9",blocking:true,resolve:"Request CPD determination."});
    if(rel){pw.proc="No ZP required";pw.rat="Religious Assembly exemption — no zoning permit needed (up to 10 guests year-round).";pw.wf=[{t:"Confirm religious assembly status"},{t:"Begin operations — no ZP required"},{t:"If exceeding 10 guests, file for Type 2/3/4"}]}
    else{pw.rat="Type 1 permitted in "+z+". Up to 10 guests year-round.";pw.wf=[{t:"Pre-app meeting (optional)"},{t:"Compile ZP application"},{t:"File with CPD"},{t:"Completeness review"},{t:"ZA decision"}];if(cor)pw.wf.splice(3,0,{t:"DPS referral and comment period"})}
    pw.rsk={nimby:"Low",escalation:"Low",timeline:"2–6 weeks",discretion:"Minimal",approval:"Low"};pw.rank="Best pathway";
  });

  tP("P2","Type 2","11–40 guests","t2",pw=>{
    let mx=40;const isSTR=isSU_TU_anyRH(z);
    if(isSTR){mx=20;
      if(isMRH3(z))pw.cav.push({msg:"M-RH-3: Type 2 SU/TU/RH rules applied conservatively",cite:"§§ 11.2.10.1–.3/§ 9.7.9",blocking:true,resolve:"Request CPD determination."});
      pw.cav.push({msg:"Prior use must be RC or Civic/Public/Institutional",cite:"§ 11.2.10.1.A",blocking:true,resolve:"Confirm with CPD or Assessor."});
      if(lot>0&&lot<12000){let msg="Lot "+lot.toLocaleString()+" sf below 12,000 sf minimum (§ 11.2.10.1.C — applies to all SU, TU, and RH zones per Code text)";if(isRH3_3A(z)||isMRH3(z))msg+=". Note: standard RH-3/3A lots are typically under 12,000 sf — consider administrative inquiry with CPD";pw.stops.push({msg,cite:"§ 11.2.10.1.C"});return}
      if(!lot)pw.cav.push({msg:"Lot size unknown — 12,000 sf min applies",cite:"§ 11.2.10.1.C",blocking:true,resolve:"Verify via Assessor."})}
    if(isSU_TU_RH25(z)&&cor){pw.stops.push({msg:"Correctional prohibited in SU/TU/RH-2.5",cite:"§ 11.2.10.2"});return}
    if(isRH3_3A(z)&&cor){pw.cav.push({msg:"Correctional in RH-3/3A triggers ZPCIM",cite:"§ 11.2.10.3",blocking:false,resolve:"Budget for CIM."});pw.proc="L-ZPCIM"}
    if(isMRH3(z)&&cor)pw.cav.push({msg:"M-RH-3 + correctional: prohibition vs ZPCIM unclear",cite:"§§ 11.2.10.2–.3",blocking:true,resolve:"Request CPD determination."});
    pw.mg=mx;pw.rat="Type 2 in "+z+". Max "+mx+(isSTR?" (SU/TU/RH cap)":"")+".";
    const cim=pw.proc.includes("ZPCIM");
    pw.rsk={nimby:cim?"Medium":"Low",escalation:cim?"Medium":"Low",timeline:cim?"8–14 weeks":"2–6 weeks",discretion:cim?"Moderate":"Low",approval:cim?"Medium":"Low"};
    if(cim)pw.rsk.clock="180-day City review clock (Exec. Order 151)";
    pw.rank=cim?"Moderate":"Good";
    pw.wf=cim?[{t:"Pre-app meeting"},{t:"Host CIM (21-day notice, 400-ft radius)"},{t:"Compile ZP + CIM summary"},{t:"File with CPD"},{t:"Completeness review"},{t:"ZA decision"}]:[{t:"Pre-app meeting (optional)"},{t:"Compile ZP application"},{t:"File with CPD"},{t:"Completeness review"},{t:"ZA decision"}];
    if(cor){const idx=pw.wf.length-1;pw.wf.splice(idx,0,{t:"DPS referral and comment period"})}
  });

  function addSpC(pw,ty){
    const sp=getSp(z);
    if(!sp){
      if(isCMP(z))pw.cav.push({msg:"CMP "+ty+" spacing needs verification (OCR anomaly noted)",cite:"§§ 11.2.11–.12",blocking:true,resolve:"Verify against official PDF."});
      else if(isIAIB(z))pw.cav.push({msg:"I-A/I-B "+ty+" spacing needs confirmation",cite:"§§ 11.2.11–.12",blocking:true,resolve:"Request CPD confirmation."});
    }
    if(isCCN12(z))pw.cav.push({msg:"C-CCN-12 not in "+ty+" spacing enumeration (only -3,-4,-5,-7,-8 listed)",cite:ty==="Type 3"?"§ 11.2.11.3":"§ 11.2.12.3",blocking:true,resolve:"Request CPD determination."});
  }

  tP("P3","Type 3","41–100 guests","t3",pw=>{
    pw.mg=100;const sp=getSp(z);
    if(sp&&d34<sp.d){pw.stops.push({msg:"Spacing: "+Math.round(d34).toLocaleString()+" ft (min "+sp.d.toLocaleString()+")",cite:sp.c3});return}
    addSpC(pw,"Type 3");
    let sn=sp?" Spacing met ("+sp.d.toLocaleString()+" ft min).":"";if(isDtNS(z))sn=" No spacing for this downtown district.";
    pw.rat="Type 3 in "+z+". 41–100 guests."+sn;
    pw.rsk={nimby:"High",escalation:"High",timeline:"12–20 weeks",discretion:"Moderate",approval:"Medium–High",clock:"180-day City review clock (Exec. Order 151)"};pw.rank="Challenging";
    pw.wf=[{t:"Pre-app meeting"},{t:"Host CIM (21-day notice, 400-ft radius)"},{t:"Compile ZP + CIM summary"},{t:"File with CPD"},{t:"Completeness review"},{t:"Agency referrals"},{t:"ZA decision"}];
    if(cor){pw.wf.splice(pw.wf.length-1,0,{t:"DPS referral and comment period"})}
  });

  tP("P4","Type 4","101+ guests","t4",pw=>{
    pw.mg=999;if(rc34>3){pw.stops.push({msg:"Density: "+rc34+" Type 3/4 within 1 mi (max 3)",cite:"§ 11.2.12.1.B"});return}
    const sp=getSp(z);if(sp&&d34<sp.d){pw.stops.push({msg:"Spacing: "+Math.round(d34).toLocaleString()+" ft (min "+sp.d.toLocaleString()+")",cite:sp.c4});return}
    addSpC(pw,"Type 4");
    let sn=sp?" Spacing met.":"";if(isDtNS(z))sn=" No spacing for this downtown district.";
    pw.rat="Type 4 in "+z+". 101+. No code cap."+sn;
    pw.rsk={nimby:"Very high",escalation:"Very high",timeline:"16–24 weeks",discretion:"Significant",approval:"High",clock:"180-day City review clock (Exec. Order 151)"};pw.rank="Most difficult";
    pw.wf=[{t:"Pre-app meeting"},{t:"Host CIM (21-day notice, 400-ft radius)"},{t:"Compile ZP + CIM summary"},{t:"File with CPD"},{t:"Completeness review"},{t:"Agency referrals"},{t:"ZA decision"}];
    if(cor){pw.wf.splice(pw.wf.length-1,0,{t:"DPS referral and comment period"})}
  });

  const p5={id:"P5",nm:"Existing conforming-use",th:"Established + maintained",v:"no",mg:null,stops:[],cav:[...gC],proc:"No new ZP",rat:"",wf:[],rsk:{},rank:""};
  if(exRC==="yes"&&mnt==="yes"){p5.v="yes";p5.rat="Legally established and maintained. Count frozen.";p5.cav.push({msg:"Count cannot increase",cite:"§ 11.2.8.1.C.1.c",blocking:false,resolve:"Verify with CPD."});p5.rsk={nimby:"Minimal",escalation:"Minimal",timeline:"Immediate",discretion:"None",approval:"Very low"};p5.rank="Best (if applicable)";p5.wf=[{t:"Confirm with CPD"},{t:"Continue within count"}]}
  else if(exRC==="yes"&&mnt==="unknown"){p5.v="conditional";p5.rat="RC confirmed, maintenance unverified.";p5.cav.push({msg:"Maintenance unconfirmed",cite:"§ 11.2.8.1.C",blocking:true,resolve:"Research via CPD/Assessor."});p5.rsk={nimby:"Unknown",escalation:"Unknown",timeline:"Pending",discretion:"Unknown",approval:"Unknown"};p5.rank="Investigate";p5.wf=[{t:"Research history"},{t:"Confirm with CPD"}]}
  else if(exRC==="yes"&&mnt==="no")p5.stops.push({msg:"Not maintained — lapsed",cite:"§ 11.2.8.1.C"});
  else p5.stops.push({msg:"No existing RC use",cite:"§ 11.2.8.1.C"});
  if(p5.stops.length)p5.v="no";R.push(p5);

  return{zone:z,gS,gC,results:R,p2:"pass"};
}

/* ═══════════════════════════════════════════════════════════════════
   COLORADO SPRINGS RULE ENGINE
   ═══════════════════════════════════════════════════════════════════ */
function runCOSEngine(f){
  const z=f.zone,ut=COS_UT[z];if(!ut)return{error:"Zone not found."};
  const cor=f.correctional==="yes";
  const fha=cor?false:(f.fhaProtected==="yes");
  const fhaUnk=!cor&&f.fhaProtected==="unknown";
  const lic=f.licensing;
  const dist=f.distGLRDetox||999999;
  const alException=f.nearestAL==="yes";
  const exRC=f.existingRC,mnt=f.maintained;
  const ct=f.constructionType;
  const R=[],gS=[],gC=[];

  // Pass 2 — General rules
  if(lic==="no")gS.push({msg:"Cannot obtain state licensing/certification",cite:"§ 7.3.107"});
  if(lic==="unknown")gC.push({msg:"Licensing status unknown",cite:"§ 7.3.107",blocking:true,resolve:"Confirm with state licensing agency."});
  if(gS.length)return{zone:z,gS,gC,results:[],p2:"fail"};

  // Manager referral risk — applies to all admin pathways
  const mgrCav={msg:"Manager may refer to Planning Commission (§ 7.5.408)",cite:"§ 7.5.408",blocking:false,resolve:"Cannot be eliminated; flag as escalation risk."};

  // Dev plan needed?
  function needsDevPlan(size){
    if(size==="small"&&ct==="existing")return false;
    if(size==="small"&&ct==="conversion")return false; // SFR exemption § 7.5.515B.2.a
    return ct==="new"||ct==="conversion";
  }

  // Pathway tester
  function tP(id,nm,th,utKey,maxRes,fn){
    let perm=ut[utKey];
    if(perm==="N"){R.push({id,nm,th,v:"no",mg:null,stops:[{msg:"Not permitted in "+z,cite:"Table 7.3.2-A"}],cav:[],proc:"N/A",rat:"",wf:[],rsk:{},rank:"Not viable"});return}
    // FBZ/PDZ gate
    if(z==="FBZ"){
      if(f.fbzPermits==="no"){R.push({id,nm,th,v:"no",mg:null,stops:[{msg:"FBZ regulating plan does not permit this use",cite:"§ 7.3.102E"}],cav:[],proc:"N/A",rat:"",wf:[],rsk:{},rank:"Not viable"});return}
      if(f.fbzPermits==="unknown"){perm="C"} // conservative
    }
    if(z==="PDZ"){
      if(utKey==="hseS"){perm="P"} // HSE Small always permitted in PDZ residential
      else if(f.pdzPermits==="no"){R.push({id,nm,th,v:"no",mg:null,stops:[{msg:"PDZ Land Use Plan does not include this use",cite:"§ 7.3.103"}],cav:[],proc:"N/A",rat:"",wf:[],rsk:{},rank:"Not viable"});return}
      else if(f.pdzPermits==="unknown"){perm="C"}
    }
    const pw={id,nm,th,v:"yes",mg:maxRes,stops:[],cav:[...gC],proc:perm==="P"?"Admin":"CUP",rat:"",wf:[],rsk:{},rank:""};
    fn(pw,perm);
    if(pw.stops.length)pw.v="no";else if(pw.cav.some(c=>c.blocking))pw.v="conditional";
    R.push(pw);
  }

  // === COS workflow templates (CPD-published timelines) ===
  const WF_ADMIN_HSE=[
    {t:"Submit HSE Application via online system (description, resident count, vicinity map, site plan)"},
    {t:"Manager completeness review"},
    {t:"Manager issues provisional permit (6 months, renewable once for 6 months) — § 7.3.301E.3"},
    {t:"Obtain state license"},
    {t:"Provisional converts to administrative permit"},
    {t:"If use discontinued 12 months → permit expires"}
  ];
  const WF_ADMIN_DP=[
    {t:"Pre-application conference (planner contact ~2 working days, appointment ~7 working days)"},
    {t:"Submit HSE Application + Development Plan (within 6-month window from pre-app)"},
    {t:"Completeness check — incomplete apps rejected"},
    {t:"First review letter (~4 weeks from submittal)"},
    {t:"Revisions submitted — planner re-review (~2 weeks per round)"},
    {t:"Manager decision (or PC if referred under § 7.5.408)"}
  ];
  const WF_CUP=[
    {t:"Pre-application conference (planner contact ~2 working days, appointment ~7 working days)"},
    {t:"Submit CUP + Dev Plan application (within 6-month window from pre-app)"},
    {t:"Completeness check — incomplete apps rejected"},
    {t:"First review letter (~4 weeks from submittal)"},
    {t:"Revisions submitted — planner re-review (~2 weeks per round)"},
    {t:"Application finalized for agenda"},
    {t:"Site posting + neighbor postcards (10 consecutive days minimum)"},
    {t:"Planning Commission hearing (3rd Thursday cycle)"},
    {t:"PC decision — approve / approve with conditions / deny"},
    {t:"10-day appeal window"}
  ];
  const WF_CUP_NODEV=[
    {t:"Pre-application conference (planner contact ~2 working days, appointment ~7 working days)"},
    {t:"Submit CUP application (within 6-month window from pre-app)"},
    {t:"Completeness check — incomplete apps rejected"},
    {t:"First review letter (~4 weeks from submittal)"},
    {t:"Revisions submitted — planner re-review (~2 weeks per round)"},
    {t:"Application finalized for agenda"},
    {t:"Site posting + neighbor postcards (10 consecutive days minimum)"},
    {t:"Planning Commission hearing (3rd Thursday cycle)"},
    {t:"PC decision — approve / approve with conditions / deny"},
    {t:"10-day appeal window"}
  ];
  const WF_ADMIN_SIMPLE=[
    {t:"Pre-application conference (optional for admin-track)"},
    {t:"Submit application"},
    {t:"Completeness check"},
    {t:"First review letter (~4 weeks)"},
    {t:"Revisions if needed (~2 weeks per round)"},
    {t:"Manager decision"}
  ];
  // No statutory review clock caveat — applies to all COS pathways
  const noClockCav={msg:"No statutory review deadline — COS timelines are targets, not maximums (unlike Denver's 180-day Exec. Order 151)",cite:"CPD Development Process",blocking:false};

  // === HSE pathways (FHA-protected only) ===
  if(fha||fhaUnk){
    const fhaLabel=fhaUnk?" (FHA status unconfirmed)":"";

    tP("HSE-S","HSE Small"+fhaLabel,"\u2264 8 residents","hseS",8,(pw,perm)=>{
      if(fhaUnk)pw.cav.push({msg:"FHA-protected status unconfirmed — if not FHA, must use GLR",cite:"§ 7.6.301",blocking:true,resolve:"Confirm population FHA status."});
      pw.cav.push(mgrCav);pw.cav.push(noClockCav);
      pw.rat="HSE Small permitted in "+z+". Up to 8 residents. No separation rule. Admin permit ($175).";
      pw.proc="Admin permit";
      pw.wf=[...WF_ADMIN_HSE];
      pw.rsk={nimby:"Very low",escalation:"Low (manager referral possible)",timeline:"1–3 months",discretion:"Minimal",approval:"Very low",fee:"$175"};
      pw.rank="Easiest pathway";
    });

    tP("HSE-M","HSE Medium"+fhaLabel,"9–15 residents","hseM",15,(pw,perm)=>{
      if(fhaUnk)pw.cav.push({msg:"FHA status unconfirmed",cite:"§ 7.6.301",blocking:true,resolve:"Confirm population FHA status."});
      pw.cav.push(mgrCav);pw.cav.push(noClockCav);
      const dp=needsDevPlan("medium");
      const isCUP=perm==="C";
      pw.proc=isCUP?"CUP + Dev Plan":"Admin + Dev Plan";
      pw.rat="HSE Medium in "+z+". 9–15 residents. No separation rule. Dev Plan required (§ 7.3.301E.2.a).";
      if(isCUP){
        pw.wf=[...WF_CUP];
        pw.rsk={nimby:"Medium",escalation:"Medium",timeline:"3–5+ months",discretion:"Moderate",approval:"Medium",fee:"$1,445 + $1,520+/acre"};pw.rank="Moderate";
      } else {
        pw.wf=[...WF_ADMIN_DP];
        pw.rsk={nimby:"Low",escalation:"Low–Medium",timeline:"2–6 months",discretion:"Low",approval:"Low",fee:"$175 + $1,520+/acre"};pw.rank="Good";
      }
    });

    tP("HSE-L","HSE Large"+fhaLabel,"\u2265 16 residents (no cap)","hseL",999,(pw,perm)=>{
      if(fhaUnk)pw.cav.push({msg:"FHA status unconfirmed",cite:"§ 7.6.301",blocking:true,resolve:"Confirm population FHA status."});
      pw.cav.push(mgrCav);pw.cav.push(noClockCav);
      const isCUP=perm==="C";
      pw.proc=isCUP?"CUP + Dev Plan":"Admin + Dev Plan";
      pw.rat="HSE Large in "+z+". 16+ residents, no UDC cap. Dev Plan required. § 7.3.301E.4 additional criteria apply.";
      if(isCUP){
        pw.wf=[...WF_CUP];
        pw.rsk={nimby:"High",escalation:"High",timeline:"3–6 months",discretion:"Significant",approval:"Medium–High",fee:"$1,445 + $1,520+/acre"};pw.rank="Moderate–Hard";
      } else {
        pw.wf=[...WF_ADMIN_DP];
        pw.rsk={nimby:"Medium",escalation:"Medium",timeline:"2–6 months",discretion:"Moderate",approval:"Low–Medium",fee:"$175 + $1,520+/acre"};pw.rank="Moderate";
      }
    });
  }

  // === GLR pathways (non-FHA or unknown) ===
  if(!fha||fhaUnk){
    const glrLabel=fhaUnk?" (if not FHA-protected)":"";
    const sepApplies=dist<1000&&!alException;

    tP("GLR-S","GLR Small"+glrLabel,"\u2264 8 residents","glrS",8,(pw,perm)=>{
      if(fhaUnk)pw.cav.push({msg:"If population IS FHA-protected, use HSE instead",cite:"§ 7.6.301",blocking:false});
      if(sepApplies){pw.stops.push({msg:"Within 1,000 ft of GLR/Detox ("+Math.round(dist).toLocaleString()+" ft)",cite:"§ 7.3.301E.1.a"});return}
      if(dist<1000&&alException)pw.cav.push({msg:"AL exception applied — verify both are AL-licensed",cite:"§ 7.3.301E.1.b",blocking:true,resolve:"Confirm with COS Planning."});
      pw.cav.push(mgrCav);pw.cav.push(noClockCav);
      const isCUP=perm==="C";
      pw.proc=isCUP?"CUP":"Admin";
      pw.rat="GLR Small in "+z+". Up to 8 residents. 1,000-ft separation "+(dist>=1000?"met.":"exception applied.");
      if(isCUP){
        pw.wf=[...WF_CUP_NODEV];
        pw.rsk={nimby:"Medium",escalation:"Medium",timeline:"3–5 months",discretion:"Moderate",approval:"Medium",fee:"$1,445"};pw.rank="Moderate";
      } else {
        pw.wf=[...WF_ADMIN_SIMPLE];
        pw.rsk={nimby:"Low",escalation:"Low",timeline:"1–3 months",discretion:"Low",approval:"Low",fee:"$175"};pw.rank="Good";
      }
    });

    tP("GLR-M","GLR Medium"+glrLabel,"9–15 residents","glrM",15,(pw,perm)=>{
      if(fhaUnk)pw.cav.push({msg:"If FHA-protected, use HSE instead",cite:"§ 7.6.301",blocking:false});
      if(sepApplies){pw.stops.push({msg:"Within 1,000 ft of GLR/Detox",cite:"§ 7.3.301E.1.a"});return}
      if(dist<1000&&alException)pw.cav.push({msg:"AL exception — verify both AL-licensed",cite:"§ 7.3.301E.1.b",blocking:true,resolve:"Confirm with COS Planning."});
      pw.cav.push(mgrCav);pw.cav.push(noClockCav);
      const isCUP=perm==="C";
      pw.proc=isCUP?"CUP + Dev Plan":"Admin + Dev Plan";
      pw.rat="GLR Medium in "+z+". 9–15 residents. § 7.3.301E.4 additional criteria apply.";
      if(isCUP){
        pw.wf=[...WF_CUP];
        pw.rsk={nimby:"Medium–High",escalation:"Medium",timeline:"3–6 months",discretion:"Moderate",approval:"Medium",fee:"$1,445 + $1,520+/acre"};pw.rank="Hard";
      } else {
        pw.wf=[...WF_ADMIN_DP];
        pw.rsk={nimby:"Low–Medium",escalation:"Low–Medium",timeline:"2–6 months",discretion:"Moderate",approval:"Low–Medium",fee:"$175 + $1,520+/acre"};pw.rank="Moderate";
      }
    });

    tP("GLR-L","GLR Large"+glrLabel,"\u2265 16 residents (no cap)","glrL",999,(pw,perm)=>{
      if(fhaUnk)pw.cav.push({msg:"If FHA-protected, use HSE instead",cite:"§ 7.6.301",blocking:false});
      if(sepApplies){pw.stops.push({msg:"Within 1,000 ft of GLR/Detox",cite:"§ 7.3.301E.1.a"});return}
      if(dist<1000&&alException)pw.cav.push({msg:"AL exception — verify both AL-licensed",cite:"§ 7.3.301E.1.b",blocking:true,resolve:"Confirm with COS Planning."});
      pw.cav.push(mgrCav);pw.cav.push(noClockCav);
      const isCUP=perm==="C";
      pw.proc=isCUP?"CUP + Dev Plan":"Admin + Dev Plan";
      pw.rat="GLR Large in "+z+". 16+ residents, no UDC cap. § 7.3.301E.4 applies.";
      if(isCUP){
        pw.wf=[...WF_CUP];
        pw.rsk={nimby:"High",escalation:"High",timeline:"3–6 months",discretion:"Significant",approval:"Medium–High",fee:"$1,445 + $1,520+/acre"};pw.rank="Hardest";
      } else {
        pw.wf=[...WF_ADMIN_DP];
        pw.rsk={nimby:"Medium",escalation:"Medium",timeline:"2–6 months",discretion:"Moderate",approval:"Medium",fee:"$175 + $1,520+/acre"};pw.rank="Moderate–Hard";
      }
    });
  }

  // === Detoxification Center ===
  tP("DETOX","Detoxification Center","24-hr medical detox","detox",999,(pw,perm)=>{
    if(sepApplies=dist<1000&&!alException){pw.stops.push({msg:"Within 1,000 ft of GLR/Detox",cite:"§ 7.3.301E.1.a"});return}
    pw.cav.push(noClockCav);
    pw.proc="CUP + Dev Plan";
    pw.rat="Detox Center in "+z+". Conditional in most zones. CUP required.";
    pw.wf=[...WF_CUP];
    pw.rsk={nimby:"Very high",escalation:"High",timeline:"3–6 months",discretion:"Significant",approval:"High",fee:"$1,445 + $1,520+/acre"};pw.rank="Very Hard";
  });

  // === Hospice ===
  if(f.targetTerminal){
    tP("HOSPICE","Hospice","\u2265 9 terminal, < 6 months","hospice",999,(pw,perm)=>{
      pw.cav.push(noClockCav);
      const isCUP=perm==="C";
      pw.proc=isCUP?"CUP":"Admin";
      pw.rat="Hospice in "+z+". \u22659 terminally ill, state licensed, 24-hour palliative.";
      if(isCUP){
        pw.wf=[...WF_CUP];
        pw.rsk={nimby:"Low–Medium",escalation:"Low",timeline:"3–5 months",discretion:"Moderate",approval:"Low–Medium",fee:"$1,445 + $1,520+/acre"};pw.rank="Moderate";
      } else {
        pw.wf=[...WF_ADMIN_SIMPLE];
        pw.rsk={nimby:"Very low",escalation:"Low",timeline:"1–3 months",discretion:"Low",approval:"Low",fee:"$175"};pw.rank="Good";
      }
    });
  }

  // === Long-term Care Facility ===
  if(f.targetOver60){
    tP("LTC","Long-term Care Facility","Persons over 60","ltc",999,(pw,perm)=>{
      pw.cav.push(noClockCav);
      const isCUP=perm==="C";
      pw.proc=isCUP?"CUP":"Admin";
      pw.rat="LTC in "+z+". Persons over 60, lodging/meals for compensation.";
      if(isCUP){
        pw.wf=[...WF_CUP_NODEV];
        pw.rsk={nimby:"Low",escalation:"Low",timeline:"3–5 months",discretion:"Moderate",approval:"Low–Medium",fee:"$1,445"};pw.rank="Moderate";
      } else {
        pw.wf=[...WF_ADMIN_SIMPLE];
        pw.rsk={nimby:"Very low",escalation:"Low",timeline:"1–3 months",discretion:"Low",approval:"Low",fee:"$175"};pw.rank="Good";
      }
    });
  }

  // === Human Services Shelter ===
  if(f.tempShelter){
    tP("SHELTER","Human Services Shelter","Temporary group lodging","shelter",999,(pw,perm)=>{
      pw.cav.push(noClockCav);
      const isCUP=perm==="C";
      pw.proc=isCUP?"CUP":"Admin";
      pw.rat="HS Shelter in "+z+". Temporary group lodging, generally unlicensed.";
      if(isCUP){
        pw.wf=[...WF_CUP];
        pw.rsk={nimby:"High",escalation:"High",timeline:"3–5+ months",discretion:"Significant",approval:"Medium–High",fee:"$1,445"};pw.rank="Hard";
      } else {
        pw.wf=[...WF_ADMIN_SIMPLE];
        pw.rsk={nimby:"Medium",escalation:"Medium",timeline:"1–3 months",discretion:"Moderate",approval:"Medium",fee:"$175"};pw.rank="Moderate";
      }
    });
  }

  // === Existing conforming use ===
  const pNC={id:"NC",nm:"Existing conforming use",th:"Pre-UDC lawful use",v:"no",mg:null,stops:[],cav:[...gC],proc:"No new app",rat:"",wf:[],rsk:{},rank:""};
  if(exRC==="yes"&&mnt==="yes"){pNC.v="yes";pNC.rat="Previously established, continuously maintained. Per § 7.3.106 / § 7.5.804, deemed to have CUP. May continue and expand within use-specific standards.";pNC.rsk={nimby:"Minimal",escalation:"Minimal",timeline:"Immediate",discretion:"None",approval:"Very low"};pNC.rank="Best (if applicable)";pNC.wf=[{t:"Confirm status with COS Planning"},{t:"Continue operations within existing scope"}]}
  else if(exRC==="yes"&&mnt==="unknown"){pNC.v="conditional";pNC.rat="Existing use confirmed, maintenance unverified.";pNC.cav.push({msg:"12-month discontinuance voids nonconforming status",cite:"§ 7.5.804E",blocking:true,resolve:"Research via COS Planning."});pNC.rsk={nimby:"Unknown",escalation:"Unknown",timeline:"Pending",discretion:"Unknown",approval:"Unknown"};pNC.rank="Investigate";pNC.wf=[{t:"Research history with COS Planning"},{t:"Confirm continuous operation"}]}
  else if(exRC==="yes"&&mnt==="no")pNC.stops.push({msg:"Discontinued 12+ months — nonconforming status lost",cite:"§ 7.5.804E"});
  else pNC.stops.push({msg:"No existing group living use on lot",cite:"§ 7.5.804"});
  if(pNC.stops.length)pNC.v="no";R.push(pNC);

  return{zone:z,gS,gC,results:R,p2:"pass"};
}

/* ═══════════════════════════════════════════════════════════════════
   RESULTS RENDERER (shared — handles both jurisdictions)
   ═══════════════════════════════════════════════════════════════════ */
function renderRes(){
  const R=ST.results;if(R.error){APP.innerHTML=`<div><p style="color:#F09595;font-weight:500;">${R.error}</p><div class="btn-row"><button class="btn-secondary" onclick="ST.results=null;ST.pg=0;render()">Back</button></div></div>`;return}
  const vi=R.results.filter(r=>r.v==="yes"),co=R.results.filter(r=>r.v==="conditional"),nv=R.results.filter(r=>r.v==="no");
  let best=0;vi.forEach(r=>{const n=r.mg===999?9999:(r.mg||0);if(n>best)best=n});
  const bL=best===9999?"No UDC cap":best===0?"\u2014":String(best);
  const viCo=R.results.filter(r=>r.v==="yes"||r.v==="conditional");
  const allC=[];viCo.forEach(r=>r.cav.forEach(c=>{if(!allC.find(x=>x.msg===c.msg))allC.push({...c,paths:viCo.filter(r2=>r2.cav.find(c2=>c2.msg===c.msg)).map(r2=>r2.nm)})}));
  const blk=allC.filter(c=>c.blocking).length;
  const jurLabel=ST.jurisdiction==="denver"?"Denver":"Colorado Springs";
  let h=`<div class="dash-header"><div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;"><div><p class="dash-title">${esc(ST.form.address)||"Analysis"}</p><p class="dash-sub">${R.zone}${ST.form.lotSize?" · "+ST.form.lotSize.toLocaleString()+" sf":""} · ${jurLabel}</p></div><button class="btn-secondary" onclick="resetState();ST.pg=0;render()" style="padding:6px 16px;font-size:12px;">New analysis</button></div></div>`;
  if(R.p2==="fail"){h+=`<div style="background:#2E1010;border:1px solid #5A2020;border-radius:10px;padding:1rem 1.25rem;margin-bottom:1.5rem;"><p style="font-size:14px;font-weight:500;color:#F09595;margin:0 0 4px;">All pathways blocked</p><p style="font-size:13px;color:#D87070;margin:0;">${R.gS.map(s=>s.msg+' <span class="cite">'+s.cite+"</span>").join("; ")}</p></div>`;h+=rFacts();APP.innerHTML=h;return}
  h+=`<div class="summary-row"><div class="stat-card"><p class="stat-label">Viable pathways</p><p class="stat-val green">${vi.length}</p></div><div class="stat-card"><p class="stat-label">Highest viable count</p><p class="stat-val">${bL}</p></div><div class="stat-card"><p class="stat-label">Open caveats</p><p class="stat-val ${blk>0?"amber":""}">${allC.length}${blk?" ("+blk+" blocking)":""}</p></div></div>`;
  h+=`<div class="tab-row"><button class="tab-btn ${ST.activeTab==="dashboard"?"active":""}" onclick="ST.activeTab='dashboard';render()">Pathways</button><button class="tab-btn ${ST.activeTab==="caveats"?"active":""}" onclick="ST.activeTab='caveats';render()">Caveats (${allC.length})</button><button class="tab-btn ${ST.activeTab==="facts"?"active":""}" onclick="ST.activeTab='facts';render()">Site facts</button></div>`;
  if(ST.activeTab==="dashboard"){if(vi.length)h+=`<p class="section-label">Viable</p>`+vi.map(pwC).join("");if(co.length)h+=`<p class="section-label">Conditional</p>`+co.map(pwC).join("");if(nv.length)h+=`<p class="section-label">Not viable</p>`+nv.map(pwC).join("")}
  else if(ST.activeTab==="caveats"){if(!allC.length)h+=`<p style="font-size:13px;color:#9B9BA7;padding:1rem 0;">No open caveats on viable pathways.</p>`;else allC.forEach(c=>{h+=`<div class="caveat-card"><div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;"><span class="stop-pill ${c.blocking?"stop-hard":"stop-caveat"}">${c.blocking?"Blocking":"Info"}</span><span class="cite">${c.cite}</span></div><p class="caveat-title">${c.msg}</p><p class="caveat-meta"><strong>Affects:</strong> ${c.paths.join(", ")}</p>${c.resolve?`<p class="caveat-meta"><strong>Resolve:</strong> ${c.resolve}</p>`:""}</div>`})}
  else if(ST.activeTab==="facts")h+=rFacts();
  APP.innerHTML=h;document.querySelectorAll(".pw-card-head").forEach(el=>{el.onclick=()=>{const id=el.getAttribute("data-id");ST.expanded[id]=!ST.expanded[id];el.nextElementSibling.classList.toggle("open");el.querySelector(".pw-arrow").classList.toggle("open")}});
}

function pwC(r){
  const bc=r.v==="yes"?"badge-yes":r.v==="conditional"?"badge-cond":"badge-no",bt=r.v==="yes"?"Viable":r.v==="conditional"?"Conditional":"Not viable";
  let ct="";if(r.v!=="no"){if(r.mg===999)ct="no cap";else if(!r.mg)ct="TBD";else ct="up to "+r.mg+" residents"}
  const isO=ST.expanded[r.id]||false;let d="";
  if(r.v!=="no"){
    d+=`<div class="detail-section"><div class="detail-heading">Why viable</div><p class="detail-text">${r.rat}</p></div>`;
    if(r.wf.length){d+=`<div class="detail-section"><div class="detail-heading">Workflow</div>`;r.wf.forEach((w,i)=>{d+=`<div class="wf-step"><div class="wf-num">${i+1}</div><div class="wf-text">${w.t}</div></div>`});d+=`</div>`}
    d+=`<div class="detail-section"><div class="detail-heading">Risk</div><div class="risk-row">`;
    const rl={nimby:"NIMBY",escalation:"Escalation",timeline:"Timeline",discretion:"Discretion",approval:"Approval",clock:"Review clock",fee:"Fee"};
    Object.entries(r.rsk).forEach(([k,v])=>{d+=`<div class="risk-item"><div class="risk-label">${rl[k]||k}</div><div class="risk-val">${v}</div></div>`});
    d+=`</div></div>`;
    if(r.cav.length){d+=`<div class="detail-section"><div class="detail-heading">Caveats (${r.cav.length})</div>`;r.cav.forEach(c=>{d+=`<div style="margin-bottom:6px;"><span class="stop-pill ${c.blocking?"stop-hard":"stop-caveat"}">${c.blocking?"Blocking":"Info"}</span> <span style="font-size:13px;color:#9B9BA7;">${c.msg}</span> <span class="cite">${c.cite}</span></div>`});d+=`</div>`}
    d+=`<div class="detail-section"><div class="detail-heading">Assessment</div><p class="detail-text"><strong>${r.rank}</strong>${r.proc?" · "+r.proc:""}</p></div>`;
  } else {d+=`<div class="detail-section"><div class="detail-heading">Why not viable</div>`;r.stops.forEach(s=>{d+=`<div style="margin-bottom:6px;"><span class="stop-pill stop-hard">Hard stop</span> <span style="font-size:13px;color:#9B9BA7;">${s.msg}</span> <span class="cite">${s.cite}</span></div>`});d+=`</div>`}
  return`<div class="pw-card"><div class="pw-card-head" data-id="${r.id}"><span class="pw-badge ${bc}">${bt}</span><span class="pw-name">${r.nm}</span><span class="pw-count">${ct}</span><span class="pw-arrow ${isO?"open":""}">&#9654;</span></div><div class="pw-detail ${isO?"open":""}">${d}</div></div>`;
}
render();

// Register service worker for PWA / Add to Home Screen
if('serviceWorker' in navigator){navigator.serviceWorker.register('./sw.js').catch(()=>{})}
</script>
